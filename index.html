<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LawRAG - AI法律顾问</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/lib/highlight.min.js"></script>
    <style>
:root {
    --bg-primary: #0f1419;
    --bg-secondary: #1a1f2e;
    --bg-tertiary: #242b3d;
    --bg-hover: #2d3548;
    --text-primary: #e7e9ea;
    --text-secondary: #8899a6;
    --accent: #c9a227;
    --accent-hover: #d4b23a;
    --border: #38444d;
    --success: #00ba7c;
    --error: #f4212e;
    --warning: #ffad1f;
    --navbar-height: 56px;
    --input-height: 80px;
    --max-width: 900px;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    line-height: 1.6;
}

.navbar {
    height: var(--navbar-height);
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
}

.navbar-brand {
    display: flex;
    align-items: center;
    gap: 8px;
}

.logo {
    font-size: 24px;
}

.brand-text {
    font-size: 20px;
    font-weight: 600;
    color: var(--accent);
}

.navbar-tabs {
    display: flex;
    gap: 8px;
}

.tab-btn {
    background: transparent;
    border: none;
    color: var(--text-secondary);
    padding: 8px 20px;
    font-size: 15px;
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.2s;
}

.tab-btn:hover {
    background: var(--bg-tertiary);
    color: var(--text-primary);
}

.tab-btn.active {
    color: var(--accent);
    background: var(--bg-tertiary);
}

.navbar-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: var(--text-secondary);
}

.status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--warning);
}

.status-dot.ready { background: var(--success); }
.status-dot.error { background: var(--error); }

.main-content {
    flex: 1;
    margin-top: var(--navbar-height);
    margin-bottom: var(--input-height);
    overflow-y: auto;
}

.panel {
    display: none;
    max-width: var(--max-width);
    margin: 0 auto;
    padding: 24px;
    min-height: calc(100vh - var(--navbar-height) - var(--input-height));
}

.panel.active {
    display: block;
}

.panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
}

.panel-header h2 {
    font-size: 20px;
    font-weight: 600;
}

.messages {
    display: flex;
    flex-direction: column;
    gap: 24px;
    padding-bottom: 24px;
}

.message {
    max-width: 85%;
    padding: 12px 16px;
    border-radius: 12px;
    line-height: 1.7;
}

.message.user {
    align-self: flex-end;
    background: var(--accent);
    color: #000;
}

.message.assistant {
    align-self: flex-start;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
}

.message.assistant h2,
.message.assistant h3,
.message.assistant h4 {
    margin: 16px 0 8px 0;
    color: var(--accent);
}

.message.assistant h2:first-child,
.message.assistant h3:first-child {
    margin-top: 0;
}

.message.assistant p {
    margin: 8px 0;
}

.message.assistant ul,
.message.assistant ol {
    margin: 8px 0;
    padding-left: 24px;
}

.message.assistant code {
    background: var(--bg-tertiary);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 14px;
}

.message.assistant pre {
    background: var(--bg-tertiary);
    padding: 12px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 12px 0;
}

.message.assistant pre code {
    background: transparent;
    padding: 0;
}

.message .sources {
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
}

.message .sources-title {
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 8px;
}

.source-card {
    background: var(--bg-tertiary);
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 8px;
    border-left: 3px solid var(--accent);
}

.source-card .source-title {
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 4px;
}

.source-card .source-content {
    font-size: 13px;
    color: var(--text-secondary);
}

.input-area {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--bg-secondary);
    border-top: 1px solid var(--border);
    padding: 16px 24px;
    height: var(--input-height);
}

.input-wrapper {
    max-width: var(--max-width);
    margin: 0 auto;
    display: flex;
    gap: 12px;
    align-items: flex-end;
}

#user-input {
    flex: 1;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    color: var(--text-primary);
    font-size: 15px;
    resize: none;
    max-height: 120px;
    line-height: 1.5;
}

#user-input:focus {
    outline: none;
    border-color: var(--accent);
}

#user-input::placeholder {
    color: var(--text-secondary);
}

.btn-send {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 12px 24px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
}

.btn-send:hover {
    background: var(--accent-hover);
}

.btn-send:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

.btn-primary {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.2s;
}

.btn-primary:hover {
    background: var(--accent-hover);
}

.btn-danger {
    background: transparent;
    color: var(--error);
    border: 1px solid var(--error);
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
}

.btn-danger:hover {
    background: var(--error);
    color: #fff;
}

.btn-icon {
    background: transparent;
    border: none;
    color: var(--text-secondary);
    padding: 4px 8px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
}

.btn-icon:hover {
    background: var(--bg-hover);
    color: var(--error);
}

.docs-list,
.history-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.doc-item,
.history-item {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    transition: border-color 0.2s;
}

.doc-item:hover,
.history-item:hover {
    border-color: var(--accent);
}

.doc-info,
.history-info {
    flex: 1;
}

.doc-name,
.history-title {
    font-weight: 600;
    margin-bottom: 4px;
}

.doc-meta,
.history-meta {
    font-size: 13px;
    color: var(--text-secondary);
}

.doc-actions,
.history-actions {
    display: flex;
    gap: 8px;
}

.empty-state {
    text-align: center;
    padding: 48px;
    color: var(--text-secondary);
}

.empty-state-icon {
    font-size: 48px;
    margin-bottom: 16px;
}

.typing-indicator {
    display: flex;
    gap: 4px;
    padding: 8px 0;
}

.typing-indicator span {
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.4s infinite ease-in-out both;
}

.typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
.typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

@keyframes bounce {
    0%, 80%, 100% { transform: scale(0); }
    40% { transform: scale(1); }
}

.toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    padding: 12px 24px;
    border-radius: 8px;
    z-index: 1000;
    animation: fadeInUp 0.3s ease;
}

.toast.error {
    border-color: var(--error);
    color: var(--error);
}

.toast.success {
    border-color: var(--success);
    color: var(--success);
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateX(-50%) translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
    }
}

@media (max-width: 768px) {
    .navbar {
        padding: 0 16px;
    }
    
    .brand-text {
        display: none;
    }
    
    .panel {
        padding: 16px;
    }
    
    .message {
        max-width: 95%;
    }
    
    .input-area {
        padding: 12px 16px;
    }
}
    </style>
</head>
<body>
    <header class="navbar">
        <div class="navbar-brand">
            <span class="logo">⚖️</span>
            <span class="brand-text">LawRAG</span>
        </div>
        <nav class="navbar-tabs">
            <button class="tab-btn active" data-tab="chat">问答</button>
            <button class="tab-btn" data-tab="docs">文档</button>
            <button class="tab-btn" data-tab="history">历史</button>
        </nav>
        <div class="navbar-status">
            <span class="status-dot"></span>
            <span class="status-text">检测中...</span>
        </div>
    </header>

    <main class="main-content">
        <section id="chat-panel" class="panel active">
            <div class="messages" id="messages"></div>
        </section>
        <section id="docs-panel" class="panel">
            <div class="panel-header">
                <h2>法律文档</h2>
                <button class="btn-primary" id="upload-btn">
                    <span>📤</span> 上传文档
                </button>
                <input type="file" id="file-input" accept=".pdf,.docx" multiple hidden>
            </div>
            <div class="docs-list" id="docs-list"></div>
        </section>
        <section id="history-panel" class="panel">
            <div class="panel-header">
                <h2>历史会话</h2>
                <button class="btn-danger" id="clear-history-btn">清空历史</button>
            </div>
            <div class="history-list" id="history-list"></div>
        </section>
    </main>

    <footer class="input-area" id="input-area">
        <div class="input-wrapper">
            <textarea id="user-input" placeholder="请输入您的法律问题..." rows="1"></textarea>
            <button class="btn-send" id="send-btn">发送</button>
        </div>
    </footer>

    <script>
const API_BASE = '';
let currentSessionId = null;
let isStreaming = false;

const md = window.markdownit({
    highlight: function (str, lang) {
        if (lang && hljs.getLanguage(lang)) {
            try {
                return hljs.highlight(str, { language: lang }).value;
            } catch (e) {}
        }
        return '';
    }
});

function $(selector) {
    return document.querySelector(selector);
}

function $$(selector) {
    return document.querySelectorAll(selector);
}

function initTabs() {
    const tabs = $$('.tab-btn');
    const panels = $$('.panel');
    const inputArea = $('#input-area');
    
    tabs.forEach(tab => {
        tab.addEventListener('click', () => {
            tabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            
            const targetPanel = tab.dataset.tab;
            panels.forEach(p => {
                p.classList.toggle('active', p.id === `${targetPanel}-panel`);
            });
            
            inputArea.style.display = targetPanel === 'chat' ? 'block' : 'none';
            
            if (targetPanel === 'docs') loadDocs();
            if (targetPanel === 'history') loadHistory();
        });
    });
}

async function checkStatus() {
    const statusDot = $('.status-dot');
    const statusText = $('.status-text');
    
    try {
        const res = await fetch(`${API_BASE}/api/status`);
        const data = await res.json();
        
        if (data.initialized) {
            statusDot.className = 'status-dot ready';
            statusText.textContent = `就绪 · ${data.doc_count}条`;
        } else if (data.loading) {
            statusDot.className = 'status-dot';
            statusText.textContent = '加载中...';
            setTimeout(checkStatus, 2000);
        } else {
            statusDot.className = 'status-dot error';
            statusText.textContent = '未就绪';
        }
    } catch (e) {
        statusDot.className = 'status-dot error';
        statusText.textContent = '连接失败';
    }
}

function renderMessage(role, content, sources = []) {
    const messages = $('#messages');
    const div = document.createElement('div');
    div.className = `message ${role}`;
    
    if (role === 'user') {
        div.textContent = content;
    } else {
        div.innerHTML = md.render(content);
        
        if (sources.length > 0) {
            const sourcesDiv = document.createElement('div');
            sourcesDiv.className = 'sources';
            sourcesDiv.innerHTML = '<div class="sources-title">📖 引用来源</div>';
            
            sources.forEach(s => {
                const card = document.createElement('div');
                card.className = 'source-card';
                card.innerHTML = `
                    <div class="source-title">${s.law_name} ${s.article}</div>
                    <div class="source-content">${s.content}</div>
                `;
                sourcesDiv.appendChild(card);
            });
            
            div.appendChild(sourcesDiv);
        }
    }
    
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    
    return div;
}

function renderTypingIndicator() {
    const messages = $('#messages');
    const div = document.createElement('div');
    div.className = 'message assistant';
    div.id = 'typing-indicator';
    div.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
}

async function sendMessage(question) {
    const sendBtn = $('#send-btn');
    const input = $('#user-input');
    
    renderMessage('user', question);
    input.value = '';
    input.style.height = 'auto';
    
    const typingIndicator = renderTypingIndicator();
    sendBtn.disabled = true;
    isStreaming = true;
    
    let assistantDiv = null;
    let fullContent = '';
    let sources = [];
    
    try {
        const res = await fetch(`${API_BASE}/api/query/stream`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ question, session_id: currentSessionId })
        });
        
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        
        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            
            const chunk = decoder.decode(value);
            const lines = chunk.split('\n');
            
            for (const line of lines) {
                if (line.startsWith('data: ')) {
                    const data = line.slice(6);
                    
                    if (data === '[DONE]') {
                        break;
                    }
                    
                    if (data.startsWith('[METADATA]')) {
                        const meta = JSON.parse(data.slice(10));
                        if (meta.session_id) currentSessionId = meta.session_id;
                        if (meta.sources) sources = meta.sources;
                    } else {
                        fullContent += data;
                        
                        if (!assistantDiv) {
                            typingIndicator.remove();
                            assistantDiv = renderMessage('assistant', fullContent);
                        } else {
                            assistantDiv.innerHTML = md.render(fullContent);
                            if (sources.length > 0) {
                                const sourcesDiv = document.createElement('div');
                                sourcesDiv.className = 'sources';
                                sourcesDiv.innerHTML = '<div class="sources-title">📖 引用来源</div>';
                                sources.forEach(s => {
                                    const card = document.createElement('div');
                                    card.className = 'source-card';
                                    card.innerHTML = `
                                        <div class="source-title">${s.law_name} ${s.article}</div>
                                        <div class="source-content">${s.content}</div>
                                    `;
                                    sourcesDiv.appendChild(card);
                                });
                                assistantDiv.appendChild(sourcesDiv);
                            }
                            $('#messages').scrollTop = $('#messages').scrollHeight;
                        }
                    }
                }
            }
        }
    } catch (e) {
        typingIndicator.remove();
        renderMessage('assistant', `错误: ${e.message}`);
    }
    
    sendBtn.disabled = false;
    isStreaming = false;
}

function initInput() {
    const input = $('#user-input');
    const sendBtn = $('#send-btn');
    
    sendBtn.addEventListener('click', () => {
        const question = input.value.trim();
        if (question && !isStreaming) {
            sendMessage(question);
        }
    });
    
    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendBtn.click();
        }
    });
    
    input.addEventListener('input', () => {
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    });
}

async function loadDocs() {
    const docsList = $('#docs-list');
    docsList.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📄</div>加载中...</div>';
    
    try {
        const res = await fetch(`${API_BASE}/api/laws`);
        const data = await res.json();
        
        if (!data.laws || data.laws.length === 0) {
            docsList.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📄</div>暂无文档<br>请上传法律文档开始使用</div>';
            return;
        }
        
        docsList.innerHTML = data.laws.map(law => `
            <div class="doc-item">
                <div class="doc-info">
                    <div class="doc-name">📄 ${law}</div>
                    <div class="doc-meta">点击查看详情</div>
                </div>
                <div class="doc-actions">
                    <button class="btn-icon" onclick="deleteDoc('${law}')">🗑️</button>
                </div>
            </div>
        `).join('');
    } catch (e) {
        docsList.innerHTML = `<div class="empty-state">加载失败: ${e.message}</div>`;
    }
}

async function deleteDoc(lawName) {
    if (!confirm(`确定删除《${lawName}》？`)) return;
    
    try {
        await fetch(`${API_BASE}/api/laws/${encodeURIComponent(lawName)}`, { method: 'DELETE' });
        showToast('删除成功', 'success');
        loadDocs();
        checkStatus();
    } catch (e) {
        showToast(`删除失败: ${e.message}`, 'error');
    }
}

function initUpload() {
    const uploadBtn = $('#upload-btn');
    const fileInput = $('#file-input');
    
    uploadBtn.addEventListener('click', () => fileInput.click());
    
    fileInput.addEventListener('change', async () => {
        const files = Array.from(fileInput.files);
        if (files.length === 0) return;
        
        uploadBtn.disabled = true;
        const total = files.length;
        let successCount = 0;
        let failCount = 0;
        
        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            uploadBtn.innerHTML = `<span>⏳</span> 上传中 (${i + 1}/${total})`;
            
            const formData = new FormData();
            formData.append('file', file);
            
            try {
                const res = await fetch(`${API_BASE}/api/upload`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                
                if (data.success) {
                    successCount++;
                    showToast(`${file.name}: ${data.message}`, 'success');
                } else {
                    failCount++;
                    showToast(`${file.name}: ${data.message || '上传失败'}`, 'error');
                }
            } catch (e) {
                failCount++;
                showToast(`${file.name}: 上传失败`, 'error');
            }
        }
        
        uploadBtn.disabled = false;
        uploadBtn.innerHTML = '<span>📤</span> 上传文档';
        fileInput.value = '';
        
        if (successCount > 0) {
            loadDocs();
            checkStatus();
        }
        
        if (total > 1) {
            showToast(`完成: ${successCount} 成功, ${failCount} 失败`, successCount > 0 ? 'success' : 'error');
        }
    });
}

async function loadHistory() {
    const historyList = $('#history-list');
    historyList.innerHTML = '<div class="empty-state"><div class="empty-state-icon">💬</div>加载中...</div>';
    
    try {
        const res = await fetch(`${API_BASE}/api/history`);
        const data = await res.json();
        
        if (!data.sessions || data.sessions.length === 0) {
            historyList.innerHTML = '<div class="empty-state"><div class="empty-state-icon">💬</div>暂无历史会话</div>';
            return;
        }
        
        historyList.innerHTML = data.sessions.map(s => `
            <div class="history-item" onclick="loadSession('${s.id}')">
                <div class="history-info">
                    <div class="history-title">${s.title || '新对话'}</div>
                    <div class="history-meta">${s.last_message || ''} · ${formatTime(s.updated_at)}</div>
                </div>
                <div class="history-actions">
                    <button class="btn-icon" onclick="event.stopPropagation(); deleteSession('${s.id}')">🗑️</button>
                </div>
            </div>
        `).join('');
    } catch (e) {
        historyList.innerHTML = `<div class="empty-state">加载失败: ${e.message}</div>`;
    }
}

async function loadSession(sessionId) {
    try {
        const res = await fetch(`${API_BASE}/api/history/${sessionId}`);
        const data = await res.json();
        
        currentSessionId = sessionId;
        $('#messages').innerHTML = '';
        
        data.messages.forEach(msg => {
            const role = msg.type === 'human' ? 'user' : 'assistant';
            renderMessage(role, msg.content);
        });
        
        $$('.tab-btn')[0].click();
    } catch (e) {
        showToast(`加载失败: ${e.message}`, 'error');
    }
}

async function deleteSession(sessionId) {
    if (!confirm('确定删除该会话？')) return;
    
    try {
        await fetch(`${API_BASE}/api/history/${sessionId}`, { method: 'DELETE' });
        showToast('删除成功', 'success');
        loadHistory();
        if (currentSessionId === sessionId) {
            currentSessionId = null;
            $('#messages').innerHTML = '';
        }
    } catch (e) {
        showToast(`删除失败: ${e.message}`, 'error');
    }
}

async function clearAllHistory() {
    if (!confirm('确定清空所有历史记录？')) return;
    
    try {
        await fetch(`${API_BASE}/api/history`, { method: 'DELETE' });
        showToast('已清空', 'success');
        loadHistory();
        currentSessionId = null;
        $('#messages').innerHTML = '';
    } catch (e) {
        showToast(`清空失败: ${e.message}`, 'error');
    }
}

function formatTime(isoString) {
    const date = new Date(isoString);
    const now = new Date();
    const diff = now - date;
    
    if (diff < 60000) return '刚刚';
    if (diff < 3600000) return `${Math.floor(diff / 60000)}分钟前`;
    if (diff < 86400000) return `${Math.floor(diff / 3600000)}小时前`;
    
    return `${date.getMonth() + 1}/${date.getDate()} ${date.getHours()}:${String(date.getMinutes()).padStart(2, '0')}`;
}

function showToast(message, type = 'info') {
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.textContent = message;
    document.body.appendChild(toast);
    
    setTimeout(() => toast.remove(), 3000);
}

function initClearHistory() {
    $('#clear-history-btn').addEventListener('click', clearAllHistory);
}

document.addEventListener('DOMContentLoaded', () => {
    initTabs();
    initInput();
    initUpload();
    initClearHistory();
    checkStatus();
});
    </script>
